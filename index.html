<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Foto</title>
  <meta name="description" content="One Foto - OneFotoBokeh.com and OneFotoFilm.com">
  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100%;
      width: 100%;
    }

    .container {
      display: flex;
      width: 100%;
      height: 100vh;
    }

    .panel {
      flex: 1;
      display: block;
      text-decoration: none;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: filter 0.3s ease;
    }

    .panel:hover {
      filter: brightness(0.88);
    }

    .panel img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    @media (max-width: 767px) {
      .container {
        flex-direction: column;
        height: auto;
        min-height: 100vh;
      }

      .panel {
        flex: none;
        height: 50vh;
        min-height: 280px;
      }
    }
  </style>
</head>
<body>
  <div class="container">

    <a href="https://www.onefotobokeh.com" class="panel" target="_blank" rel="noopener noreferrer">
      <img src="logo-onefotobokeh.jpg" alt="OneFotoBokeh.com - Accessory | Bokeh">
    </a>

    <a href="https://www.onefotofilm.com" class="panel" target="_blank" rel="noopener noreferrer">
      <img src="logo-onefotofilm.jpg" alt="OneFotoFilm.com">
    </a>

  </div>
</body>
</html>
